<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRBC Ryder Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase loaded via compat SDK (non-module) so it works with regular scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root {
  --blue: #1a3fa8;
  --blue-dark: #122d7a;
  --blue-light: #2952d4;
  --gold: #d4a427;
  --gold-light: #f0c04a;
  --gold-dim: rgba(212,164,39,0.15);
  --rizo: #1a3fa8;
  --rizo-light: #4a7fd4;
  --rizo-dim: rgba(26,63,168,0.2);
  --brooks: #c8352a;
  --brooks-light: #e84035;
  --brooks-dim: rgba(200,53,42,0.2);
  --bg: #0d0d0d;
  --surface: #181818;
  --surface2: #222222;
  --border: rgba(255,255,255,0.07);
  --cream: #f0ede5;
  --muted: rgba(240,237,229,0.85);
  --very-muted: rgba(240,237,229,0.55);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: "Outfit", sans-serif;
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background-image:
    radial-gradient(ellipse at 80% 100%, rgba(212,164,39,0.06) 0%, transparent 50%);
}

/* ── HEADER ── */
.sb-header {
  padding: 28px 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  position: relative;
}
.sb-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--rizo-light), var(--gold), var(--brooks-light));
}
.brbc-logo {
  height: 90px;
  width: auto;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}
.sb-tournament-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(212,164,39,0.4);
}
.live-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: "DM Mono", monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}
.live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SCOREBOARD BANNER ── */
.scoreboard-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 12px;
}
.team-score-block { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.team-label-lg {
  font-family: "Bebas Neue", sans-serif;
  font-size: 32px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
}
.rizo-label { color: var(--rizo-light); }
.brooks-label { color: var(--brooks-light); }
.team-score-lg {
  font-family: "Bebas Neue", sans-serif;
  font-size: 72px; font-weight: 900; line-height: 1; letter-spacing: -2px;
}
.score-divider { display:flex; flex-direction:column; align-items:center; gap:2px; }
.max-pts { font-family:"Outfit",sans-serif; font-size:9px; color:var(--very-muted); letter-spacing:1px; }
.score-sep { font-size:20px; color:var(--very-muted); }
.proj-score {
  font-family: "Bebas Neue", sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 2px;
  opacity: 0.5;
}
.rizo-proj { color: var(--rizo-light); }
.brooks-proj { color: var(--brooks-light); }
.match-proj {
  font-family: "Bebas Neue", sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  opacity: 0.5;
  margin-top: 1px;
}

/* ── PROGRESS ── */
.progress-bar-wrap { padding: 0 20px 16px; }
.progress-bar {
  height: 6px; background: var(--surface2); border-radius: 3px; overflow:hidden; display:flex;
}
.progress-rizo { height:100%; background:var(--rizo-light); transition:width 0.5s ease; }
.progress-brooks { height:100%; background:var(--brooks); transition:width 0.5s ease; }
.progress-labels { display:flex; justify-content:space-between; margin-top:6px; }
.rizo-label-sm { font-family:"Outfit",sans-serif; font-size:10px; color:var(--rizo-light); }
.brooks-label-sm { font-family:"Outfit",sans-serif; font-size:10px; color:var(--brooks-light); }

/* ── MATCHES ── */
.matches-label {
  font-family:"Barlow Condensed",sans-serif; font-size:11px; font-weight:700;
  letter-spacing:3px; color:var(--very-muted); padding:0 20px 10px;
}
.matches-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; padding-bottom:40px; }

.match-card {
  background: linear-gradient(135deg, rgba(28,28,28,1) 0%, rgba(18,18,18,1) 60%, rgba(22,22,22,1) 100%);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:14px; padding:10px 14px; cursor:pointer; transition:all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.match-card:active { transform:scale(0.98); background:var(--surface2); }
.match-card.leading-rizo {
  border-color: rgba(74,127,212,0.4);
  background: linear-gradient(135deg, rgba(74,127,212,0.18) 0%, rgba(20,24,36,1) 60%, rgba(13,13,13,1) 100%);
  box-shadow: 0 2px 16px rgba(74,127,212,0.15), inset 3px 0 0 var(--rizo-light);
}
.match-card.leading-brooks {
  border-color: rgba(232,64,53,0.4);
  background: linear-gradient(135deg, rgba(232,64,53,0.18) 0%, rgba(36,18,18,1) 60%, rgba(13,13,13,1) 100%);
  box-shadow: 0 2px 16px rgba(232,64,53,0.15), inset 3px 0 0 var(--brooks-light);
}
.match-card.match-final {
  opacity: 0.85;
}

/* Winner banner */
.winner-banner {
  margin: 0 16px 16px;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: bannerPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.winner-banner.rizo-wins {
  background: linear-gradient(135deg, rgba(74,127,212,0.2), rgba(74,127,212,0.05));
  border: 1px solid rgba(74,127,212,0.4);
}
.winner-banner.brooks-wins {
  background: linear-gradient(135deg, rgba(232,64,53,0.2), rgba(232,64,53,0.05));
  border: 1px solid rgba(232,64,53,0.4);
}
.winner-banner::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.rizo-wins::before { background: linear-gradient(90deg, transparent, var(--rizo-light), transparent); }
.brooks-wins::before { background: linear-gradient(90deg, transparent, var(--brooks-light), transparent); }
.winner-emoji { font-size: 32px; margin-bottom: 4px; }
.winner-title {
  font-family: "Bebas Neue", sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 4px;
}
.rizo-wins .winner-title { color: var(--rizo-light); }
.brooks-wins .winner-title { color: var(--brooks-light); }
.winner-sub {
  font-family: "Outfit", sans-serif;
  font-size: 13px;
  color: var(--muted);
}
@keyframes bannerPop {
  from { opacity:0; transform:scale(0.95) translateY(-8px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.match-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.match-time {
  font-family:"Barlow Condensed",sans-serif; font-size:11px; font-weight:700;
  letter-spacing:2px; color:var(--gold); text-transform:uppercase;
}
.match-thru { font-family:"Outfit",sans-serif; font-size:10px; color:var(--muted); }
.thru-final { color:#4ade80; }

.match-teams { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.team-col { flex:1; display:flex; flex-direction:column; gap:3px; }
.brooks-col { align-items:flex-end; text-align:right; }
.team-name-sm {
  font-family:"Bebas Neue",sans-serif; font-size:18px; font-weight:800; letter-spacing:1px;
}
.rizo-name { color:var(--rizo-light); }
.brooks-name { color:var(--brooks-light); }
.team-players { font-size:13px; font-weight:500; line-height:1.4; }
.team-pts-sm {
  font-family:"Bebas Neue",sans-serif; font-size:28px; font-weight:900; line-height:1;
}
.rizo-pts { color:var(--rizo-light); }
.brooks-pts { color:var(--brooks-light); }
.match-vs { font-family:"Bebas Neue",sans-serif; font-size:11px; font-weight:700; color:var(--very-muted); }

.sub-matches { display:flex; gap:6px; border-top:1px solid var(--border); padding-top:10px; }
.sub-match { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.sub-label { font-family:"Outfit",sans-serif; font-size:10px; font-weight:500; color:var(--very-muted); letter-spacing:0.5px; }
.sub-status {
  font-family:"Outfit",sans-serif; font-size:11px; font-weight:600;
  text-align:center; line-height:1.2;
  display:inline-block; padding:3px 8px; border-radius:20px;
}
.status-rizo {
  color:var(--rizo-light);
  background:rgba(74,127,212,0.15);
  border:1px solid rgba(74,127,212,0.25);
}
.status-brooks {
  color:var(--brooks-light);
  background:rgba(232,64,53,0.15);
  border:1px solid rgba(232,64,53,0.25);
}
.status-neutral { color:var(--muted); background:transparent; border:none; }
.match-hint { font-family:"Outfit",sans-serif; font-size:8px; color:var(--very-muted); text-align:center; margin-top:6px; letter-spacing:1px; }
.match-thru-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.match-timestamp { font-family:"Outfit",sans-serif; font-size:9px; color:var(--very-muted); }

.clinch-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: "Outfit", sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 4px;
  vertical-align: middle;
}
.clinch-rizo {
  background: rgba(74,127,212,0.2);
  border: 1px solid rgba(74,127,212,0.4);
  color: var(--rizo-light);
}
.clinch-brooks {
  background: rgba(232,64,53,0.2);
  border: 1px solid rgba(232,64,53,0.4);
  color: var(--brooks-light);
}

/* ── ENTRY SCREEN ── */
.entry-header {
  display:flex; align-items:flex-start; gap:12px;
  padding:16px 16px 12px;
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:10;
}
.back-btn {
  background:var(--surface2); border:1px solid var(--border); color:var(--cream);
  font-family:"Barlow Condensed",sans-serif; font-size:15px; font-weight:600; letter-spacing:1px;
  padding:8px 14px; border-radius:8px; cursor:pointer; flex-shrink:0; transition:all 0.15s;
}
.back-btn:active { transform:scale(0.95); }
.entry-title { flex:1; min-width:0; }
.entry-match-time {
  font-family:"Barlow Condensed",sans-serif; font-size:11px; font-weight:700;
  letter-spacing:3px; color:var(--gold); text-transform:uppercase;
}
.entry-players { font-size:13px; font-weight:500; line-height:1.4; margin-top:2px; }
.vs-sm { color:var(--muted); font-size:11px; font-weight:400; }

.sub-status-bar { display:flex; background:var(--surface2); border-bottom:1px solid var(--border); }
.sub-status-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 6px; border-right:1px solid var(--border);
}
.sub-status-item:last-child { border-right:none; }
.sub-status-label { font-family:"Outfit",sans-serif; font-size:8px; letter-spacing:1.5px; color:var(--very-muted); margin-bottom:4px; }
.sub-status-val { font-family:"Barlow Condensed",sans-serif; font-size:14px; font-weight:700; text-align:center; line-height:1.2; }
.sc-rizo {
  color:var(--rizo-light);
  background:rgba(74,127,212,0.15);
  border:1px solid rgba(74,127,212,0.25);
  padding:2px 8px; border-radius:20px; display:inline-block;
}
.sc-brooks {
  color:var(--brooks-light);
  background:rgba(232,64,53,0.15);
  border:1px solid rgba(232,64,53,0.25);
  padding:2px 8px; border-radius:20px; display:inline-block;
}
.sc-neutral { color:var(--muted); }

.holes-entry-list { padding:12px 16px; display:flex; flex-direction:column; gap:8px; padding-bottom:40px; }

.nine-divider { display:flex; align-items:center; gap:10px; padding:4px 0; }
.nine-line { flex:1; height:1px; background:var(--border); }
.nine-tag { font-family:"Barlow Condensed",sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; color:var(--very-muted); }

.hole-entry-row {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; gap:10px;
}
.hole-entry-row.scored { border-color:rgba(255,255,255,0.12); }
.hole-entry-meta { display:flex; align-items:baseline; gap:10px; }
.hole-entry-num { font-family:"Barlow Condensed",sans-serif; font-size:28px; font-weight:900; line-height:1; min-width:28px; }
.hole-entry-info { font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
.special-badge {
  display:inline-flex; align-items:center; gap:3px;
  background:var(--gold-dim); border:1px solid rgba(212,164,39,0.3);
  color:var(--gold-light); font-size:10px; font-weight:600;
  padding:2px 8px; border-radius:10px;
}

.hole-btns { display:flex; gap:6px; }
.hole-btn {
  flex:1; padding:12px 6px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface2); color:var(--muted);
  font-family:"Barlow Condensed",sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px;
  cursor:pointer; transition:all 0.12s;
}
.hole-btn:active { transform:scale(0.95); }
.active-rizo { background:var(--rizo-dim); border-color:var(--rizo-light); color:var(--rizo-light); }
.active-brooks { background:var(--brooks-dim); border-color:var(--brooks-light); color:var(--brooks-light); }
.active-halved { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-light); }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.match-card { animation:fadeUp 0.3s ease both; }
.match-card:nth-child(1){animation-delay:.04s} .match-card:nth-child(2){animation-delay:.08s}
.match-card:nth-child(3){animation-delay:.12s} .match-card:nth-child(4){animation-delay:.16s}
.match-card:nth-child(5){animation-delay:.20s} .match-card:nth-child(6){animation-delay:.24s}
.match-card:nth-child(7){animation-delay:.28s} .match-card:nth-child(8){animation-delay:.32s}

.screen { display:none; min-height:100vh; }
.screen.active { display:block; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(10,10,10,0.98);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(212,164,39,0.25);
  display: flex;
  padding: 0 0 20px;
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; padding: 12px 4px 0;
  transition: all 0.2s;
  position: relative;
  border-top: 2px solid transparent;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.nav-item.active {
  border-top-color: var(--gold);
}
.nav-item.active::before {
  content: "";
  position: absolute;
  top: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--gold);
  filter: blur(4px);
  opacity: 0.6;
}
.nav-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  color: rgba(240,237,229,0.3);
  text-align: center;
  transition: color 0.2s;
}
.nav-item.active .nav-label {
  color: var(--gold);
}

/* ── PAGE PADDING (account for bottom nav) ── */
.page-content { padding-bottom: 90px; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 28px 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  position: relative;
}
.page-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--rizo-light), var(--gold), var(--brooks-light));
}
.page-header-logo { height: 90px; width: auto; margin-bottom: 8px; }
.page-title {
  font-family: "Bebas Neue", sans-serif;
  font-size: 32px; letter-spacing: 2px; color: var(--cream); line-height: 1;
  text-align: center;
}
.page-subtitle {
  font-family: "Outfit", sans-serif;
  font-size: 12px; color: var(--gold); letter-spacing: 2px;
  text-transform: uppercase; margin-top: 4px;
  text-align: center;
}

/* ── RULES PAGE ── */
.rules-block {
  padding: 20px 20px 0;
}
.rules-block-title {
  font-family: "Bebas Neue", sans-serif;
  font-size: 18px; letter-spacing: 2px; color: var(--gold);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(212,164,39,0.2);
}
.rule-row {
  padding: 12px 0 12px 14px;
  border-left: 2px solid rgba(212,164,39,0.3);
  margin-bottom: 10px;
}
.rule-row.last { margin-bottom: 0; }
.rule-row-name {
  font-family: "Outfit", sans-serif;
  font-size: 13px; font-weight: 600; color: var(--cream);
  margin-bottom: 3px;
}
.rule-row-desc {
  font-family: "Outfit", sans-serif;
  font-size: 12px; color: var(--muted); line-height: 1.5;
}

/* ── RANKINGS PAGE ── */
.rankings-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.rank-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.rank-card.captain-card {
  border-color: rgba(212,164,39,0.3);
  background: rgba(212,164,39,0.05);
}
.rank-num {
  font-family: "Bebas Neue", sans-serif;
  font-size: 28px; color: var(--very-muted);
  line-height: 1; min-width: 32px; text-align: center; flex-shrink: 0;
}
.captain-card .rank-num { color: var(--gold); }
.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-family: "Bebas Neue", sans-serif;
  font-size: 20px; letter-spacing: 1px; color: var(--cream); line-height: 1;
}
.rank-stats {
  display: flex; gap: 12px; margin: 6px 0;
  flex-wrap: wrap;
}
.rank-stat {
  display: flex; flex-direction: column; align-items: center;
}
.rank-stat-val {
  font-family: "Bebas Neue", sans-serif;
  font-size: 16px; color: var(--gold); line-height: 1;
}
.rank-stat-label {
  font-family: "Outfit", sans-serif;
  font-size: 9px; color: var(--very-muted); letter-spacing: 1px; text-transform: uppercase;
}
.rank-bio {
  font-family: "Outfit", sans-serif;
  font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 6px;
}
.captain-badge {
  display: inline-block;
  background: var(--gold-dim); border: 1px solid rgba(212,164,39,0.3);
  color: var(--gold-light); font-family: "Outfit", sans-serif;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  padding: 2px 8px; border-radius: 10px; margin-left: 8px;
  text-transform: uppercase; vertical-align: middle;
}
.rank-odds {
  font-family: "Bebas Neue", sans-serif;
  font-size: 18px; color: var(--gold); text-align: right; flex-shrink: 0;
}
.rankings-section-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 16px; letter-spacing: 3px; color: var(--very-muted);
  padding: 16px 16px 4px; text-transform: uppercase;
}

/* ── CHAMPIONS PAGE ── */
.champions-content { padding: 16px; }
.champ-trophy { text-align: center; font-size: 64px; padding: 20px 0 8px; }
.champ-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.champ-card.rizo-win { border-color: rgba(74,127,212,0.3); }
.champ-card.brooks-win { border-color: rgba(232,64,53,0.3); }
.champ-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.champ-card.rizo-win::before { background: linear-gradient(90deg, transparent, var(--rizo-light), transparent); }
.champ-card.brooks-win::before { background: linear-gradient(90deg, transparent, var(--brooks-light), transparent); }
.champ-photo {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  object-position: center top;
  border-radius: 8px;
  margin-bottom: 14px;
  display: block;
}
.champ-year {
  font-family: "Bebas Neue", sans-serif;
  font-size: 13px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px;
}
.champ-winner {
  font-family: "Bebas Neue", sans-serif;
  font-size: 32px; letter-spacing: 1px; line-height: 1; margin-bottom: 8px;
}
.rizo-win .champ-winner { color: var(--rizo-light); }
.brooks-win .champ-winner { color: var(--brooks-light); }
.champ-score {
  font-family: "Outfit", sans-serif;
  font-size: 22px; font-weight: 700; color: var(--cream);
}
.champ-score-label {
  font-family: "Outfit", sans-serif;
  font-size: 11px; color: var(--muted); margin-top: 4px;
}
.champ-roster-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 13px; letter-spacing: 2px; color: var(--very-muted);
  margin-top: 16px; margin-bottom: 8px;
}
.champ-roster {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.champ-roster-name {
  font-family: "Outfit", sans-serif;
  font-size: 11px; font-weight: 400;
  color: var(--cream);
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.3px;
}
.champ-roster-name:nth-last-child(-n+2) { border-bottom: none; }
.champ-roster-name:nth-child(odd) { padding-right: 12px; border-right: 1px solid var(--border); }
.champ-roster-name:nth-child(even) { padding-left: 12px; }
.champ-series {
  background: var(--surface);
  border: 1px solid rgba(212,164,39,0.4);
  border-radius: 14px;
  padding: 14px 16px;
  margin-top: 16px;
  text-align: center;
}
.series-label {
  font-family: "Bebas Neue", sans-serif;
  font-size: 16px; color: var(--cream); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 10px;
}
.series-score {
  display: flex; justify-content: center; align-items: center; gap: 16px;
}
.series-team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.series-team-name {
  font-family: "Bebas Neue", sans-serif;
  font-size: 13px; letter-spacing: 2px;
}
.series-team-wins {
  font-family: "Bebas Neue", sans-serif;
  font-size: 42px; line-height: 1;
}
.series-divider {
  font-family: "Outfit", sans-serif;
  font-size: 20px; color: var(--very-muted);
}
</style>
</head>

function clinchStatus(matchId, segment) {
  // Walk sequentially — stop at first unentered hole so we only assess what's been played
  const holes = (matchData[matchId] && matchData[matchId].holes) ? matchData[matchId].holes : {};
  const start = segment === "front" ? 1 : segment === "back" ? 10 : 1;
  const end   = segment === "front" ? 9 : segment === "back" ? 18 : 18;
  const total = end - start + 1;
  let rizo = 0, brooks = 0, entered = 0;
  for(let i = start; i <= end; i++) {
    const v = holes[i];
    if(!v) break; // stop at first unentered hole — no gaps
    if(v === "rizo") rizo++;
    else if(v === "brooks") brooks++;
    entered++;
    const remaining = total - entered;
    const diff = rizo - brooks;
    if(Math.abs(diff) > remaining) {
      return { winner: diff > 0 ? "rizo" : "brooks", up: Math.abs(diff), remaining };
    }
  }
  return null;
}

    if(v==="rizo"){rF++;frontPlayed++;} else if(v==="brooks"){bF++;frontPlayed++;} else if(v==="halved"){frontPlayed++;}
  }
  for(let i=10;i<=18;i++){
    const v=holes[i];
    if(v==="rizo"){rB++;backPlayed++;} else if(v==="brooks"){bB++;backPlayed++;} else if(v==="halved"){backPlayed++;}
  }

  // Award point if segment fully complete OR already clinched
  const fClinched = clinchStatus(matchId, "front");
  const bClinched = clinchStatus(matchId, "back");
  const tClinched = clinchStatus(matchId, "total");

  const front = frontPlayed===9
    ? (rF>bF?{r:1,b:0}:bF>rF?{r:0,b:1}:{r:0.5,b:0.5})
    : fClinched ? (fClinched.winner==="rizo"?{r:1,b:0}:{r:0,b:1})
    : {r:0,b:0};

  const back = backPlayed===9
    ? (rB>bB?{r:1,b:0}:bB>rB?{r:0,b:1}:{r:0.5,b:0.5})
    : bClinched ? (bClinched.winner==="rizo"?{r:1,b:0}:{r:0,b:1})
    : {r:0,b:0};

  const rT=rF+rB, bT=bF+bB;
  const total = (frontPlayed===9&&backPlayed===9)
    ? (rT>bT?{r:1,b:0}:bT>rT?{r:0,b:1}:{r:0.5,b:0.5})
    : tClinched ? (tClinched.winner==="rizo"?{r:1,b:0}:{r:0,b:1})
    : {r:0,b:0};

  return {front,back,total,rF,bF,rB,bB,rT,bT,frontPlayed,backPlayed};
}

// Projected points: completed segments use actual result, in-progress use current leader, unstarted = 0.5 each
function calcProjectedPts(matchId) {
  const pts = calcMatchPts(matchId);
  const {frontPlayed, backPlayed, rF, bF, rB, bB, rT, bT} = pts;

  // Front 9
  let fProj;
  if(frontPlayed===9) { fProj = pts.front; } // already decided
  else if(frontPlayed===0) { fProj = {r:0.5,b:0.5}; } // not started
  else { fProj = rF>bF?{r:1,b:0}:bF>rF?{r:0,b:1}:{r:0.5,b:0.5}; } // in progress

  // Back 9
  let bProj;
  if(backPlayed===9) { bProj = pts.back; }
  else if(backPlayed===0) { bProj = {r:0.5,b:0.5}; }
  else { bProj = rB>bB?{r:1,b:0}:bB>rB?{r:0,b:1}:{r:0.5,b:0.5}; }

  // Total 18
  let tProj;
  if(frontPlayed===9&&backPlayed===9) { tProj = pts.total; }
  else if(frontPlayed===0&&backPlayed===0) { tProj = {r:0.5,b:0.5}; }
  else { tProj = rT>bT?{r:1,b:0}:bT>rT?{r:0,b:1}:{r:0.5,b:0.5}; }

  return {
    r: fProj.r + bProj.r + tProj.r,
    b: fProj.b + bProj.b + tProj.b
  };
}

function holesPlayed(matchId) {
  return Object.keys(matchData[matchId].holes).length;
}

function statusStr(rizoN, brooksN, played, max) {
  if(played===0) return "—";
  const d = rizoN - brooksN;
  if(d===0) return played>=max?"Halved":"A/S";
  const up = Math.abs(d);
  return up + " UP";
}

function statusTeam(rizoN, brooksN) {
  const d = rizoN - brooksN;
  if(d > 0) return "rizo";
  if(d < 0) return "brooks";
  return "neutral";
}

function scClass(s, team) {
  if(!s||s==="—") return "sc-neutral";
  if(s==="A/S"||s==="Halved") return "sc-neutral";
  if(team==="rizo") return "sc-rizo";
  if(team==="brooks") return "sc-brooks";
  return "sc-neutral";
}

function sClass(s, team) {
  if(!s||s==="—") return "status-neutral";
  if(s==="A/S"||s==="Halved") return "status-neutral";
  if(team==="rizo") return "status-rizo";
  if(team==="brooks") return "status-brooks";
  return "status-neutral";
}

function specialBadge(special) {
  if(special==="ctp")       return "🎯 Closest to Pin";
  if(special==="longdrive") return "💪 Long Drive";
  if(special==="drink")     return "🍺 Drink 1 Full Drink";
  return "";
}

function fmtPts(v) { return v%1===0?v:v.toFixed(1); }

function renderScoreboard() {
  // Don't re-render scoreboard HTML if user is in entry screen
  const sbEl = document.getElementById("screen-scoreboard");
  if(!sbEl) return;
  let rizoTotal=0, brooksTotal=0;
  let cards = "";

  // Sort: in-progress first, not started second, complete last
  const sortedMatches = [...MATCHES].sort((a, b) => {
    const pA = holesPlayed(a.id), pB = holesPlayed(b.id);
    const scoreA = pA === 18 ? 2 : pA === 0 ? 1 : 0;
    const scoreB = pB === 18 ? 2 : pB === 0 ? 1 : 0;
    return scoreA - scoreB;
  });

  sortedMatches.forEach((m,idx) => {
    const pts = calcMatchPts(m.id);
    const played = holesPlayed(m.id);
    rizoTotal += pts.front.r + pts.back.r + pts.total.r;
    brooksTotal += pts.front.b + pts.back.b + pts.total.b;

    const thru = played===0?"Not Started":(played===18?"Final":"Thru "+played);
    const fS = statusStr(pts.rF,pts.bF,Math.min(played,9),9);
    const bS = played>=10?statusStr(pts.rB,pts.bB,played-9,9):"—";
    const tS = statusStr(pts.rT,pts.bT,played,18);

    // Clinch detection
    const frontPlayed = Math.min(played, 9);
    const backPlayed = Math.max(0, played - 9);
    const fClinch = frontPlayed > 0 ? clinchStatus(m.id, "front") : null;
    const bClinch = backPlayed > 0 ? clinchStatus(m.id, "back") : null;
    const tClinch = played > 0 ? clinchStatus(m.id, "total") : null;

    function clinchBadge(c) {
      if(!c) return "";
      const cls = c.winner==="rizo"?"clinch-rizo":"clinch-brooks";
      const label = c.winner==="rizo"?"RIZO":"BROOKS";
      return '<span class="clinch-badge ' + cls + '">✓ ' + label + ' ' + c.up + '&' + c.remaining + '</span>';
    }
    const rizoMatchPts = pts.front.r+pts.back.r+pts.total.r;
    const brooksMatchPts = pts.front.b+pts.back.b+pts.total.b;
    const matchProj = calcProjectedPts(m.id);
    const rizoMatchProj = matchProj.r;
    const brooksMatchProj = matchProj.b;
    const showProj = played > 0 && (rizoMatchPts !== rizoMatchProj || brooksMatchPts !== brooksMatchProj);

    // Card border class based on overall match lead (all 3 sub-matches combined projection)
    const projLead = rizoMatchProj - brooksMatchProj;
    let cardClass = "";
    if(played > 0 && projLead > 0) cardClass = "leading-rizo";
    else if(played > 0 && projLead < 0) cardClass = "leading-brooks";
    if(played === 18) cardClass += " match-final";

    const ts = timeAgo(matchData[m.id].lastUpdated);
    cards += `
      <div class="match-card ${cardClass}" data-match-id="${m.id}">
        <div class="match-card-header">
          <div class="match-time">${m.time}</div>
          <div class="match-thru-wrap">
            <div class="match-thru ${played===18?"thru-final":""}">${thru}</div>
            ${ts ? '<div class="match-timestamp">' + ts + '</div>' : ""}
          </div>
        </div>
        <div class="match-teams">
          <div class="team-col">
            <div class="team-name-sm rizo-name">RIZO</div>
            <div class="team-players">${m.rizo[0]}<br>${m.rizo[1]}</div>
            <div class="team-pts-sm rizo-pts">${fmtPts(rizoMatchPts)}</div>
            ${showProj ? '<div class="match-proj rizo-proj">PROJ ' + fmtPts(rizoMatchProj) + '</div>' : ""}
          </div>
          <div class="match-vs">VS</div>
          <div class="team-col brooks-col">
            <div class="team-name-sm brooks-name">BROOKS</div>
            <div class="team-players">${m.brooks[0]}<br>${m.brooks[1]}</div>
            <div class="team-pts-sm brooks-pts">${fmtPts(brooksMatchPts)}</div>
            ${showProj ? '<div class="match-proj brooks-proj">PROJ ' + fmtPts(brooksMatchProj) + '</div>' : ""}
          </div>
        </div>
        <div class="sub-matches">
          <div class="sub-match">
            <span class="sub-label">Front 9</span>
            ${fClinch ? clinchBadge(fClinch) : '<span class="sub-status ' + sClass(fS, statusTeam(pts.rF,pts.bF)) + '">' + fS + '</span>'}
          </div>
          <div class="sub-match">
            <span class="sub-label">Back 9</span>
            ${bClinch ? clinchBadge(bClinch) : '<span class="sub-status ' + sClass(bS, statusTeam(pts.rB,pts.bB)) + '">' + bS + '</span>'}
          </div>
          <div class="sub-match">
            <span class="sub-label">Total</span>
            ${tClinch ? clinchBadge(tClinch) : '<span class="sub-status ' + sClass(tS, statusTeam(pts.rT,pts.bT)) + '">' + tS + '</span>'}
          </div>
        </div>
        <div class="match-hint">TAP TO ENTER SCORES →</div>
      </div>`;
  });

  const maxPts = 24;
  const winThreshold = 12.5;
  const rizoNeeds = Math.max(0, winThreshold - rizoTotal);
  const brooksNeeds = Math.max(0, winThreshold - brooksTotal);
  let rizoProj=0, brooksProj=0;
  MATCHES.forEach(m => {
    const proj = calcProjectedPts(m.id);
    rizoProj += proj.r;
    brooksProj += proj.b;
  });

  // Winner banner
  let winnerBanner = "";
  if(rizoTotal >= 12.5) {
    winnerBanner = `<div class="winner-banner rizo-wins">
      <div class="winner-emoji">🏆</div>
      <div class="winner-title">Team Rizo Wins the Cup!</div>
      <div class="winner-sub">${fmtPts(rizoTotal)} — ${fmtPts(brooksTotal)} · Brooks needed 12.5 to retain</div>
    </div>`;
  } else if(brooksTotal >= 12.5) {
    winnerBanner = `<div class="winner-banner brooks-wins">
      <div class="winner-emoji">🏆</div>
      <div class="winner-title">Team Brooks Wins the Cup!</div>
      <div class="winner-sub">${fmtPts(brooksTotal)} — ${fmtPts(rizoTotal)} · Rizo needed 12.5 to retain</div>
    </div>`;
  }

  document.getElementById("screen-scoreboard").innerHTML = `
    <div class="sb-header">
      <img src="${LOGO}" alt="BRBC" class="brbc-logo">
      <div class="sb-tournament-label">Ryder Cup 2026</div>
      
    </div>
    <div class="scoreboard-banner">
      <div class="team-score-block">
        <div class="team-label-lg rizo-label">RIZO</div>
        <div class="team-score-lg">${fmtPts(rizoTotal)}</div>
        <div class="proj-score rizo-proj">PROJ ${fmtPts(rizoProj)}</div>
      </div>
      <div class="score-divider">
        <div class="max-pts">${fmtPts(winThreshold)} TO WIN</div>
        <div class="score-sep">—</div>
      </div>
      <div class="team-score-block">
        <div class="team-label-lg brooks-label">BROOKS</div>
        <div class="team-score-lg">${fmtPts(brooksTotal)}</div>
        <div class="proj-score brooks-proj">PROJ ${fmtPts(brooksProj)}</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar">
        <div class="progress-rizo" style="width:${(rizoTotal/maxPts)*100}%"></div>
        <div class="progress-brooks" style="width:${(brooksTotal/maxPts)*100}%"></div>
      </div>
      <div class="progress-labels">
        <span class="rizo-label-sm">Team Rizo</span>
        <span class="brooks-label-sm">Team Brooks</span>
      </div>
    </div>
    ${winnerBanner}
    <div class="matches-label">MATCHES</div>
    <div class="matches-list">${cards}</div>
  `;

}

    const lbl = document.createElement("div");
    lbl.className = "sub-status-label";
    lbl.textContent = label;
    item.appendChild(lbl);
    if(clinch) {
      const badge = document.createElement("span");

      item.appendChild(badge);

  // Hole list
  const holeList = document.createElement("div");

  HOLES.forEach(h => {

      holeList.appendChild(div);
    }

    const row = document.createElement("div");

    [["rizo","RIZO"],["halved","½"],["brooks","BROOKS"]].forEach(function(pair) {

  });

  entryEl.appendChild(holeList);
}


function setHole(holeNum, result) {
  if(!currentMatchId) return;
  const current = matchData[currentMatchId].holes[holeNum];
  const now = Date.now();
  if(current === result) {
    delete matchData[currentMatchId].holes[holeNum];
    if(window._fbRemove) window._fbRemove(`matches/${currentMatchId}/holes/${holeNum}`);
  } else {
    matchData[currentMatchId].holes[holeNum] = result;
    if(window._fbUpdate) window._fbUpdate(`matches/${currentMatchId}/holes`, { [holeNum]: result });
  }
  matchData[currentMatchId].lastUpdated = now;
  if(window._fbUpdate) window._fbUpdate(`matches/${currentMatchId}`, { lastUpdated: now });
  renderEntry();
}

function timeAgo(ts) {
  if(!ts) return null;
  const secs = Math.floor((Date.now() - ts) / 1000);
  if(secs < 60) return "just now";
  const mins = Math.floor(secs / 60);
  if(mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins/60)}h ago`;
}

  currentTab = tab;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));

  if(tab === "champions") renderChampions();
}

  document.getElementById("screen-entry").classList.remove("active");
  document.getElementById("screen-scoreboard").classList.add("active");

function renderRankings() {
  const el = document.getElementById("screen-rankings");



  const playerCards = PLAYERS.map(p => `
    <div class="rank-card">
      <div class="rank-num">${p.rank}</div>
      <div class="rank-info">
        <div class="rank-name">${p.name}</div>
        <div class="rank-stats">
          <div class="rank-stat"><div class="rank-stat-val">${p.hcp}</div><div class="rank-stat-label">HCP</div></div>
          <div class="rank-stat"><div class="rank-stat-val">${p.appearances}</div><div class="rank-stat-label">Apps</div></div>
          <div class="rank-stat"><div class="rank-stat-val">${p.titles}</div><div class="rank-stat-label">Titles</div></div>
          <div class="rank-stat"><div class="rank-stat-val">${p.ryderWins}</div><div class="rank-stat-label">Ryder W</div></div>
        </div>
        <div class="rank-bio">${p.bio}</div>
      </div>
    </div>
  `).join("");

  el.innerHTML = `
    <div class="page-header">
      <img src="${LOGO}" alt="BRBC" class="page-header-logo">
      <div class="page-title">Rankings</div>
      <div class="page-subtitle">2026 Ryder Cup</div>
    </div>
    <div class="page-content">
      <div class="rankings-section-label">2026 Draft Rankings</div>
      <div class="rankings-list">${playerCards}</div>
    </div>
  `;
}

function renderChampions() {
  const el = document.getElementById("screen-champions");
  const rizoWins = PAST_CHAMPS.filter(c => c.rizoWin).length;
  const brooksWins = PAST_CHAMPS.filter(c => !c.rizoWin).length;

  const champCards = PAST_CHAMPS.map(c => `
    <div class="champ-card ${c.rizoWin?"rizo-win":"brooks-win"}">
      ${c.photo ? '<img src="' + c.photo + '" class="champ-photo" alt="' + c.year + ' Champions">' : ""}
      <div class="champ-year">${c.year} RYDER CUP</div>
      <div class="champ-winner">${c.winner}</div>
      <div class="champ-score">${c.score}</div>
      <div class="champ-score-label">Final Score</div>
      ${c.roster && c.roster.length ? `
        <div class="champ-roster-label">Team Roster</div>
        <div class="champ-roster">${c.roster.map(n => '<div class="champ-roster-name">' + n + '</div>').join("")}</div>
      ` : ""}
    </div>
  `).join("");

  el.innerHTML = `
    <div class="page-header">
      <img src="${LOGO}" alt="BRBC" class="page-header-logo">
      <div class="page-title">Hall of Champions</div>
      <div class="page-subtitle">Ryder Cup History · Est. 2024</div>
    </div>
    <div class="page-content">
      <div class="champions-content">
        
        ${champCards}
        <div class="champ-series">
          <div class="series-label">All-Time Series</div>
          <div class="series-score">
            <div class="series-team">
              <div class="series-team-name rizo-label">RIZO</div>
              <div class="series-team-wins" style="color:var(--rizo-light)">${rizoWins}</div>
            </div>
            <div class="series-divider">—</div>
            <div class="series-team">
              <div class="series-team-name brooks-label">BROOKS</div>
              <div class="series-team-wins" style="color:var(--brooks-light)">${brooksWins}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Single persistent delegation listener
document.addEventListener("click", function(e) {
  const card = e.target.closest("[data-match-id]");
  if(card) { openEntry(card.dataset.matchId); return; }
  const holeBtn = e.target.closest("[data-hole]");
  if(holeBtn) { setHole(parseInt(holeBtn.dataset.hole), holeBtn.dataset.result); return; }
  if(e.target.closest("#back-btn")) { goBack(); return; }
  const navItem = e.target.closest(".nav-item");
  if(navItem) { showTab(navItem.id.replace("nav-","")); return; }
});

// Render immediately with local data
try {
  renderScoreboard();
} catch(err) {
  document.getElementById("screen-scoreboard").innerHTML = `
    <div style="padding:40px 20px;color:#f0ede5;font-family:Outfit,sans-serif;font-size:14px">
      <div style="font-size:20px;margin-bottom:12px;color:#d4a427">BRBC Load Error</div>
      <div style="opacity:0.7;word-break:break-all;line-height:1.6">${err.message}<br><br>${err.stack||''}</div>
    </div>`;
  document.getElementById("screen-scoreboard").classList.add("active");
}

    renderScoreboard();
  });

  window._fbUpdate = (path, value) => db.ref(path).update(value);
  window._fbRemove = (path) => db.ref(path).remove();

} catch(err) {
  console.warn("Firebase unavailable, running local only:", err);
}

// Refresh timestamps every 60 seconds
setInterval(() => { if(!currentMatchId) renderScoreboard(); }, 60000);
</script>
</body>
</html>
